<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>24点 · 深空幻梭 | 限时挑战</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #03050a;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            position: relative;
            overflow-x: hidden;
        }

        /* ========= 科幻动态背景 (星云粒子) ========= */
        #cyber-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            opacity: 0.9;
        }

        /* 深邃渐变叠加 */
        body::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 30% 40%, rgba(0, 40, 80, 0.4) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(20, 10, 50, 0.6) 0%, transparent 55%),
                        repeating-linear-gradient(45deg, rgba(0,255,255,0.02) 0px, rgba(0,255,255,0.02) 2px, transparent 2px, transparent 10px);
            z-index: 1;
            pointer-events: none;
        }

        .game-container {
            position: relative;
            z-index: 20;
            width: 100%;
            max-width: 820px;
            background: rgba(5, 15, 28, 0.4);
            backdrop-filter: blur(16px) saturate(200%);
            -webkit-backdrop-filter: blur(16px) saturate(200%);
            border-radius: 4rem;
            padding: 2.5rem 2rem;
            box-shadow: 0 30px 60px -20px #000,
                        0 0 0 1px rgba(0, 255, 255, 0.15) inset,
                        0 0 40px rgba(0, 180, 255, 0.2);
            border: 1px solid rgba(0, 255, 255, 0.2);
            transition: box-shadow 0.4s;
            animation: borderPulse 6s infinite alternate;
        }

        @keyframes borderPulse {
            0% { box-shadow: 0 30px 60px -20px #000, 0 0 0 1px rgba(0, 255, 255, 0.2) inset, 0 0 30px rgba(0, 180, 255, 0.3); }
            100% { box-shadow: 0 40px 70px -15px #000, 0 0 0 2px rgba(100, 200, 255, 0.4) inset, 0 0 60px rgba(0, 240, 255, 0.5); }
        }

        /* 头部增加计时器 */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .game-title {
            font-size: 2.4rem;
            font-weight: 500;
            background: linear-gradient(135deg, #a8e0ff, #7aaaff, #c0b0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            filter: drop-shadow(0 0 15px #00a6ff);
            letter-spacing: 2px;
        }

        .level-badge {
            background: rgba(0, 20, 40, 0.8);
            backdrop-filter: blur(8px);
            padding: 0.6rem 1.6rem;
            border-radius: 40px;
            font-size: 1.3rem;
            font-weight: 500;
            border: 1px solid rgba(0, 255, 255, 0.3);
            box-shadow: 0 0 15px cyan;
            color: #b0f0ff;
        }

        .level-badge span {
            font-weight: 700;
            color: #fff;
            margin-left: 0.5rem;
            font-size: 1.8rem;
            text-shadow: 0 0 15px cyan;
        }

        /* 计时器圆环风格 */
        .timer-section {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            background: rgba(0, 10, 25, 0.7);
            backdrop-filter: blur(8px);
            padding: 0.5rem 1.5rem;
            border-radius: 60px;
            border: 1px solid #00ffff40;
            box-shadow: 0 0 20px #00b3ff;
        }

        .timer-icon {
            font-size: 1.8rem;
            line-height: 1;
            filter: drop-shadow(0 0 6px cyan);
        }

        .timer-display {
            font-size: 2.2rem;
            font-family: 'Courier New', monospace;
            font-weight: 600;
            color: #f0fcff;
            text-shadow: 0 0 15px #00ccff, 0 0 30px #006eff;
            min-width: 80px;
            text-align: center;
            letter-spacing: 3px;
        }

        .timer-unit {
            font-size: 1.2rem;
            color: #8ab3ff;
        }

        /* 卡牌区域 */
        .cards-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1.2rem;
            margin: 2.8rem 0 2.5rem;
            perspective: 1200px;
        }

        .card {
            flex: 0 0 auto;
            width: 130px;
            height: 170px;
            background: linear-gradient(145deg, #102436, #05101f);
            border-radius: 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 30px -10px black,
                        inset 0 0 0 1px rgba(0, 255, 255, 0.3),
                        inset 0 -4px 8px rgba(0,0,0,0.8),
                        0 0 20px #00a6ff40;
            border: 1px solid #00ffff60;
            transition: transform 0.25s ease, box-shadow 0.3s ease;
            cursor: pointer;
            animation: cardFloat 4s infinite alternate;
        }

        .card:hover {
            transform: translateY(-12px) scale(1.03) rotateY(3deg);
            box-shadow: 0 30px 40px -10px #000, 0 0 0 2px cyan, 0 0 40px cyan;
        }

        .card-value {
            font-size: 5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #e0ffc0, #fffac2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px #ffee90, 0 0 40px #4effb5;
        }

        .card-suit {
            font-size: 1.1rem;
            letter-spacing: 3px;
            color: #00ffffaa;
            text-transform: uppercase;
        }

        /* 表达式面板 */
        .expression-panel {
            background: rgba(0, 10, 20, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 60px;
            padding: 1.2rem 2rem;
            margin: 1.8rem 0 2.2rem;
            border: 1px solid cyan;
            box-shadow: inset 0 2px 10px #000000, 0 10px 20px -10px black, 0 0 30px #0044ff;
        }

        .expression-display {
            background: transparent;
            width: 100%;
            border: none;
            outline: none;
            color: #e2f0ff;
            font-size: 2.1rem;
            font-weight: 400;
            letter-spacing: 2px;
            text-align: center;
            font-family: 'Courier New', monospace;
            caret-color: cyan;
            text-shadow: 0 0 10px cyan;
        }

        .expression-display::placeholder {
            color: #1a4f7a;
            font-size: 1.4rem;
        }

        /* 按钮网格 */
        .button-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 1rem;
            margin: 1.8rem 0 0.8rem;
        }

        .btn {
            background: rgba(0, 25, 45, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid #00a6ff60;
            border-bottom-width: 3px;
            border-bottom-color: #002c50;
            color: #c3f0ff;
            font-size: 2rem;
            font-weight: 500;
            padding: 1rem 0;
            border-radius: 36px;
            box-shadow: 0 10px 12px -8px black, inset 0 1px 2px cyan, 0 0 10px #006eff;
            cursor: pointer;
            transition: all 0.12s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            user-select: none;
        }

        .btn.small { font-size: 1.7rem; }
        .btn.wide { grid-column: span 2; }
        .btn.operator { background: rgba(0, 60, 100, 0.8); color: #ffffb0; font-size: 2.3rem; }
        .btn.action { background: rgba(0, 30, 60, 0.9); font-size: 1.8rem; }
        .btn.equal { background: linear-gradient(145deg, #0077be, #003d66); border-bottom-color: #001d33; color: white; font-weight: 600; text-shadow: 0 2px 10px cyan; }

        .btn:hover {
            background: #005f9e;
            border-bottom-color: cyan;
            transform: translateY(-2px);
            box-shadow: 0 16px 20px -10px #030613, 0 0 30px cyan;
        }
        .btn:active {
            transform: translateY(3px);
            border-bottom-width: 1px;
        }

        /* 消息区域 + 嘲讽 */
        .message-area {
            min-height: 4rem;
            margin: 1rem 0 0.5rem;
            font-size: 1.4rem;
            text-align: center;
            color: #bbffff;
            text-shadow: 0 0 15px magenta;
            font-weight: 500;
            letter-spacing: 1px;
        }
        .congrats {
            color: #ffde7a;
            font-size: 1.8rem;
            text-shadow: 0 0 30px #ffaa00, 0 0 60px #ff6a00;
            animation: glowPulse 1.5s infinite;
        }
        .sarcasm {
            color: #ff9680;
            font-size: 1.7rem;
            text-shadow: 0 0 20px #ff3300;
        }
        @keyframes glowPulse {
            0% { text-shadow: 0 0 15px #ffb347; }
            50% { text-shadow: 0 0 35px #ffd966, 0 0 15px #f1c40f; }
            100% { text-shadow: 0 0 15px #ffb347; }
        }

        .foot-note {
            color: #5f9fbf;
            font-size: 0.95rem;
            text-align: center;
            margin-top: 2rem;
            border-top: 1px dashed #00aaff60;
            padding-top: 1.2rem;
        }

        @media (max-width: 600px) {
            .game-container { padding: 1.5rem 1rem; }
            .card { width: 100px; height: 140px; }
            .card-value { font-size: 4rem; }
            .btn { font-size: 1.5rem; padding: 0.8rem 0; }
            .button-grid { gap: 0.6rem; }
        }
    </style>
</head>
<body>
    <canvas id="cyber-canvas"></canvas> <!-- 动态粒子背景 -->

    <div class="game-container">
        <div class="header">
            <div class="game-title">◈ 深空·24点 ◈</div>
            <div class="level-badge">关卡 <span id="levelDisplay">1</span></div>
            <div class="timer-section">
                <span class="timer-icon">⌛</span>
                <span id="timerDisplay" class="timer-display">60</span>
                <span class="timer-unit">秒</span>
            </div>
        </div>

        <!-- 四张卡牌 -->
        <div class="cards-row" id="cardsContainer"></div>

        <!-- 表达式显示区 -->
        <div class="expression-panel">
            <input type="text" id="exprInput" class="expression-display" readonly placeholder="点击卡牌和运算符构建算式" value="">
        </div>

        <!-- 按钮面板 -->
        <div class="button-grid">
            <div class="btn operator" data-op="+">+</div>
            <div class="btn operator" data-op="−">−</div>
            <div class="btn operator" data-op="*">×</div>
            <div class="btn operator" data-op="/">÷</div>
            <div class="btn small" data-op="(">(</div>
            <div class="btn small" data-op=")">)</div>

            <div class="btn action wide" id="backspaceBtn">⌫ 退格</div>
            <div class="btn action" id="clearBtn">C 清空</div>
            <div class="btn equal wide" id="calculateBtn">= 计算</div>
        </div>

        <!-- 刷新当前关卡 -->
        <div style="display: flex; justify-content: flex-end; margin-top: 0.5rem;">
            <div class="btn action" id="refreshBtn" style="padding: 0.6rem 2rem; font-size: 1.3rem;">⟳ 量子重洗</div>
        </div>

        <div id="messageBox" class="message-area"></div>
        <div class="foot-note">⚡ 每关限时 · 两关减5秒 · 最少10秒 ⚡</div>
    </div>

    <script>
        (function() {
            // ---------- 科幻粒子背景 (Canvas) ----------
            const canvas = document.getElementById('cyber-canvas');
            const ctx = canvas.getContext('2d');
            let width, height;
            let particles = [];

            function initParticles() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;

                const particleCount = 120;
                particles = [];
                for (let i = 0; i < particleCount; i++) {
                    particles.push({
                        x: Math.random() * width,
                        y: Math.random() * height,
                        radius: Math.random() * 2.5 + 1,
                        speedX: (Math.random() - 0.5) * 0.35,
                        speedY: (Math.random() - 0.5) * 0.25,
                        color: `rgba(${100 + Math.random()*100}, ${150 + Math.random()*100}, 255, ${Math.random()*0.5+0.3})`,
                        glow: Math.random() * 0.8 + 0.4
                    });
                }
            }

            function drawParticles() {
                ctx.clearRect(0, 0, width, height);
                ctx.fillStyle = '#03050a';
                ctx.fillRect(0, 0, width, height);

                // 绘制星云光晕
                let gradient = ctx.createRadialGradient(width*0.3, height*0.4, 100, width*0.3, height*0.4, 800);
                gradient.addColorStop(0, 'rgba(0,100,200,0.15)');
                gradient.addColorStop(1, 'rgba(0,0,30,0)');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, width, height);

                gradient = ctx.createRadialGradient(width*0.8, height*0.7, 200, width*0.8, height*0.7, 1000);
                gradient.addColorStop(0, 'rgba(80,20,150,0.2)');
                gradient.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, width, height);

                // 绘制粒子
                for (let p of particles) {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fillStyle = p.color;
                    ctx.shadowColor = '#aaccff';
                    ctx.shadowBlur = 12 * p.glow;
                    ctx.fill();

                    p.x += p.speedX;
                    p.y += p.speedY;

                    if (p.x < 0) p.x = width;
                    if (p.x > width) p.x = 0;
                    if (p.y < 0) p.y = height;
                    if (p.y > height) p.y = 0;
                }
                ctx.shadowBlur = 0;
                requestAnimationFrame(drawParticles);
            }

            window.addEventListener('resize', () => {
                initParticles();
            });
            initParticles();
            drawParticles();

            // ---------- 游戏核心 ----------
            let currentLevel = 1;
            let currentCards = [];
            let currentExpr = '';

            // 计时相关
            let timeLeft = 60;            // 当前剩余秒数
            let timeLimitForThisLevel = 60; // 本关上限（随关卡变化）
            let timerInterval = null;
            const INITIAL_TIME = 60;
            const MIN_TIME = 10;

            // DOM
            const levelSpan = document.getElementById('levelDisplay');
            const cardsDiv = document.getElementById('cardsContainer');
            const exprInput = document.getElementById('exprInput');
            const messageBox = document.getElementById('messageBox');
            const timerDisplay = document.getElementById('timerDisplay');

            // 辅助函数：计算本关时间上限 (基于当前关卡数)
            function calcTimeLimit(level) {
                // 进入第 level 关时，已通关 level-1 关，每2关减5秒
                let deduction = Math.floor((level - 1) / 2) * 5;
                return Math.max(MIN_TIME, INITIAL_TIME - deduction);
            }

            // 停止计时器
            function stopTimer() {
                if (timerInterval) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                }
            }

            // 启动计时器 (基于当前 timeLeft 开始倒计时)
            function startTimer() {
                stopTimer(); // 确保只有一个
                timerInterval = setInterval(() => {
                    timeLeft -= 1;
                    timerDisplay.textContent = timeLeft;

                    if (timeLeft <= 0) {
                        timeLeft = 0;
                        timerDisplay.textContent = '0';
                        stopTimer();
                        // 时间到，闯关失败，从头再来
                        messageBox.innerHTML = '<span class="sarcasm">⏰ 闯关失败，从头再来...</span>';
                        resetGame(); // 重置到第一关
                    }
                }, 1000);
            }

            // 重置整个游戏 (从头再来)
            function resetGame() {
                stopTimer();
                currentLevel = 1;
                levelSpan.textContent = currentLevel;
                timeLimitForThisLevel = calcTimeLimit(currentLevel);
                timeLeft = timeLimitForThisLevel;
                timerDisplay.textContent = timeLeft;
                // 生成新卡牌
                currentCards = generateValidCards();
                renderCards();
                currentExpr = '';
                exprInput.value = '';
                // 消息保留失败信息，但可以稍后覆盖；先清掉
                // 启动计时器
                startTimer();
            }

            // 加载新关卡 (进入下一关)
            function loadNewLevel() {
                stopTimer();
                currentLevel++;
                levelSpan.textContent = currentLevel;
                // 重新计算本关时间上限
                timeLimitForThisLevel = calcTimeLimit(currentLevel);
                timeLeft = timeLimitForThisLevel;
                timerDisplay.textContent = timeLeft;
                // 生成新卡牌
                currentCards = generateValidCards();
                renderCards();
                currentExpr = '';
                exprInput.value = '';
                // 启动计时器
                startTimer();
            }

            // 刷新当前关卡 (不增加关卡)
            function refreshSameLevel() {
                stopTimer();
                // 重新生成卡牌
                currentCards = generateValidCards();
                renderCards();
                currentExpr = '';
                exprInput.value = '';
                // 重置时间为本关上限
                timeLeft = timeLimitForThisLevel;
                timerDisplay.textContent = timeLeft;
                messageBox.innerHTML = ''; // 清除消息
                startTimer();
            }

            // ---------- 24点可解性 & 生成卡牌 ----------
            const EPS = 1e-6;
            function isCloseTo24(val) {
                return Math.abs(val - 24) < EPS;
            }

            function hasSolution(nums) {
                if (nums.length === 1) return isCloseTo24(nums[0]);
                const n = nums.length;
                for (let i = 0; i < n; i++) {
                    for (let j = i + 1; j < n; j++) {
                        const a = nums[i];
                        const b = nums[j];
                        const remaining = nums.filter((_, idx) => idx !== i && idx !== j);
                        const candidates = [
                            a + b,
                            a * b,
                            a - b,
                            b - a,
                            a !== 0 ? b / a : null,
                            b !== 0 ? a / b : null
                        ];
                        const results = new Set();
                        for (let val of candidates) {
                            if (val !== null && !isNaN(val)) {
                                results.add(Math.round(val * 1e8) / 1e8);
                            }
                        }
                        for (let val of results) {
                            if (hasSolution([val, ...remaining])) return true;
                        }
                    }
                }
                return false;
            }

            function generateValidCards() {
                const maxAttempts = 400;
                for (let attempt = 0; attempt < maxAttempts; attempt++) {
                    const candidate = [
                        Math.floor(Math.random() * 13) + 1,
                        Math.floor(Math.random() * 13) + 1,
                        Math.floor(Math.random() * 13) + 1,
                        Math.floor(Math.random() * 13) + 1
                    ];
                    const allEqual = candidate.every(v => v === candidate[0]);
                    if (allEqual) continue;
                    if (hasSolution(candidate)) {
                        return candidate;
                    }
                }
                return [3, 4, 6, 8]; // 保底
            }

            // 渲染卡牌
            function renderCards() {
                let html = '';
                currentCards.forEach((val, idx) => {
                    const suitSymbol = ['♠', '♥', '♦', '♣'][idx % 4];
                    html += `
                        <div class="card" data-card-value="${val}" data-card-index="${idx}">
                            <div class="card-value">${val}</div>
                            <div class="card-suit">${suitSymbol}</div>
                        </div>
                    `;
                });
                cardsDiv.innerHTML = html;

                document.querySelectorAll('.card').forEach(card => {
                    card.addEventListener('click', () => {
                        const val = card.getAttribute('data-card-value');
                        currentExpr += val;
                        exprInput.value = currentExpr;
                    });
                });
            }

            // 检查数字使用是否恰好为卡牌
            function isNumbersMatch(expr, cards) {
                const numberMatches = expr.match(/\d+/g);
                if (!numberMatches) return cards.length === 0;
                const exprNumbers = numberMatches.map(Number).sort((a,b)=>a-b);
                const cardNumbers = [...cards].sort((a,b)=>a-b);
                if (exprNumbers.length !== cardNumbers.length) return false;
                for (let i=0; i<exprNumbers.length; i++) {
                    if (exprNumbers[i] !== cardNumbers[i]) return false;
                }
                return true;
            }

            // 处理计算
            function handleCalculate() {
                if (!currentExpr.trim()) {
                    messageBox.innerHTML = '📡 请先构建表达式';
                    return;
                }

                if (!isNumbersMatch(currentExpr, currentCards)) {
                    messageBox.innerHTML = '<span class="sarcasm">不是哥们你这么菜吗</span> (数字必须每个用一次)';
                    return;
                }

                let result;
                try {
                    const safeExpr = currentExpr.replace(/×/g, '*').replace(/÷/g, '/').replace(/−/g, '-');
                    result = eval(safeExpr);
                    if (typeof result !== 'number' || isNaN(result) || !isFinite(result)) throw new Error();
                } catch (e) {
                    messageBox.innerHTML = '<span class="sarcasm">不是哥们你这么菜吗</span> (算式无效)';
                    return;
                }

                if (isCloseTo24(result)) {
                    // 通关!
                    messageBox.innerHTML = '<span class="congrats">✨ 跃迁成功！进入下一关 ✨</span>';
                    loadNewLevel();  // 关卡+1，计时器重置为新上限
                } else {
                    // 失败：嘲讽
                    messageBox.innerHTML = `<span class="sarcasm">不是哥们你这么菜吗</span> (结果 = ${result})`;
                }
            }

            // 初始化第一关
            function initGame() {
                currentLevel = 1;
                levelSpan.textContent = currentLevel;
                timeLimitForThisLevel = calcTimeLimit(currentLevel);
                timeLeft = timeLimitForThisLevel;
                timerDisplay.textContent = timeLeft;
                currentCards = generateValidCards();
                renderCards();
                currentExpr = '';
                exprInput.value = '';
                messageBox.innerHTML = '';
                stopTimer();
                startTimer();
            }

            // 绑定按钮事件
            function bindEvents() {
                document.querySelectorAll('.btn[data-op]').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const op = btn.getAttribute('data-op');
                        currentExpr += op;
                        exprInput.value = currentExpr;
                    });
                });

                document.getElementById('backspaceBtn').addEventListener('click', () => {
                    currentExpr = currentExpr.slice(0, -1);
                    exprInput.value = currentExpr;
                });

                document.getElementById('clearBtn').addEventListener('click', () => {
                    currentExpr = '';
                    exprInput.value = '';
                    messageBox.innerHTML = '';
                });

                document.getElementById('calculateBtn').addEventListener('click', handleCalculate);

                document.getElementById('refreshBtn').addEventListener('click', () => {
                    refreshSameLevel();
                });
            }

            // 启动一切
            initGame();
            bindEvents();

            // 暴露resetGame给时间到回调 (已在resetGame定义)
        })();
    </script>
</body>
</html>
