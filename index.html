<!DOCTYPE html>
<html lang="zh">
<head>

    <style>
        /* 全局重置与科技战争色调 */
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Arial', 'Helvetica Neue', sans-serif;
            user-select: none;
        }
        body {
            background: #1a262f;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 16px;
            background-image:
                linear-gradient(45deg, rgba(100, 150, 200, 0.05) 25%, transparent 25%),
                linear-gradient(-45deg, rgba(100, 150, 200, 0.05) 25%, transparent 25%);
            background-size: 60px 60px;
        }
        #app {
            max-width: 1200px;
            width: 100%;
            background: #2c3e4f;
            border-radius: 40px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.7), inset 0 0 20px #3a5068;
            padding: 30px;
            border: 2px solid #7f8c8d60;
            backdrop-filter: blur(2px);
        }
        /* 登录界面 */
        .login-container {
            text-align: center;
            padding: 40px 20px;
            background: #2b3b4a;
            border-radius: 36px;
            border: 1px solid #5680a9;
            box-shadow: inset 0 0 30px #1c2a36;
        }
        .login-container h1 {
            color: #d4eaff;
            text-shadow: 0 0 10px #3f8ec9, 0 2px 2px black;
            font-weight: 400;
            letter-spacing: 3px;
        }
        .login-container input {
            font-size: 1.3rem;
            padding: 14px 30px;
            border: none;
            border-radius: 60px;
            background: #1e2c38;
            box-shadow: inset 0 5px 10px #0f171f, 0 0 0 2px #5680a9;
            color: #e1f0ff;
            width: 320px;
            margin: 25px 0;
            font-family: 'Courier New', monospace;
            letter-spacing: 1px;
        }
        .login-container input::placeholder {
            color: #7f9fbb;
            font-style: italic;
        }
        .war-btn {
            background: linear-gradient(145deg, #3a5068, #1e2f3f);
            border: none;
            border-radius: 60px;
            padding: 14px 40px;
            font-size: 1.3rem;
            font-weight: 600;
            color: #f0f9ff;
            text-shadow: 0 2px 3px #0f1a24;
            box-shadow: 0 10px 0 #0e1a24, 0 10px 20px #00000080;
            cursor: pointer;
            transition: 0.08s linear;
            border: 1px solid #5c7f9c;
            letter-spacing: 2px;
        }
        .war-btn:active {
            transform: translateY(6px);
            box-shadow: 0 4px 0 #0e1a24, 0 8px 16px #00000080;
        }
        .war-btn.small {
            padding: 10px 28px;
            font-size: 1.0rem;
            box-shadow: 0 6px 0 #0e1a24, 0 6px 12px #00000080;
        }
        .war-btn.disabled {
            opacity: 0.4;
            pointer-events: none;
        }
        /* 主菜单 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1d2b38;
            border-radius: 60px;
            padding: 12px 28px;
            margin-bottom: 30px;
            color: #c6e2ff;
            font-weight: 600;
            flex-wrap: wrap;
            border: 1px solid #3c617f;
            box-shadow: inset 0 0 12px #17232e;
        }
        .user-info span {
            background: #0f1f2c;
            padding: 8px 24px;
            border-radius: 40px;
            margin: 0 8px;
            display: inline-block;
            box-shadow: inset 0 2px 8px #000000, 0 2px 0 #405e79;
            color: #b3dfff;
            border: 1px solid #385771;
        }
        .menu-buttons {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 30px 0;
        }
        /* 游戏区 */
        .game-area {
            background: #1b2936;
            border-radius: 48px;
            padding: 30px;
            box-shadow: inset 0 0 0 2px #2f4b62, 0 20px 30px #00000080;
            border: 2px solid #50718b;

        }
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }
        .mine-count {
            background: #101e2b;
            border-radius: 40px;
            padding: 12px 32px;
            color: #f2c94c;
            font-weight: bold;
            font-size: 1.3rem;
            box-shadow: inset 0 3px 8px black, 0 0 0 2px #3d607b;
            border: 1px solid #6d8eac;
        }
        .card-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .card-btn {
            background: linear-gradient(145deg, #2d465a, #14222e);
            border-radius: 40px;
            padding: 12px 24px;
            color: #ecf9ff;
            font-weight: bold;
            font-size: 1.0rem;
            box-shadow: 0 5px 0 #0a141f, 0 6px 12px black;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 2px solid #4d7a9e;
            transition: 0.05s linear;
        }
        .card-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #0a141f, 0 4px 10px black;
        }
        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 28px;
            box-shadow: 0 0 0 3px #2e4c68, 0 20px 30px black;
            background: #19242f;
            touch-action: none;
            width: min(800px, 90vw);
            height: auto;
            image-rendering: crisp-edges;
        }
        /* 弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0e1a24e0;
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .modal-content {
            background: #1e303f;
            border-radius: 60px;
            padding: 40px;
            max-width: 500px;

            color: #ddf2ff;

        .modal-content h2 {

            text-shadow: 0 0 20px #00a8ff;
        }
        .modal-actions {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        .close-btn {

            font-size: 32px;

            background: none;
            border: none;
            color: #b0d6ff;
        }
        .achievement-grid {
            display: grid;

            { id:33, name:'初学者好运', desc:'第一次玩就赢了', icon:'🍀' },
            { id:34, name:'雷之眼', desc:'使用排雷卡正确标记10个雷', icon:'👁️' },
            { id:35, name:'连击', desc:'连续胜利5局', icon:'🔥' },

            { id:40, name:'雷阵雨', desc:'一局中遇到10个雷连续', icon:'⛈️' },
            { id:41, name:'大慈善家', desc:'购买10张排雷卡', icon:'🎁' },
            { id:42, name:'极限挑战', desc:'自定义最大网格并完成', icon:'🌍' },
            { id:43, name:'百战不殆', desc:'累计玩100局', icon:'💪' },
            { id:44, name:'战争机器', desc:'使用战争风格游玩50局', icon:'🧚' },
            { id:45, name:'成就猎人', desc:'解锁20个成就', icon:'🏆' },
            { id:46, name:'传奇工兵', desc:'解锁所有成就', icon:'👑' },
            { id:47, name:'一点就炸·改', desc:'连续五次首点击炸', icon:'💥' },
            { id:48, name:'保守派', desc:'从未使用排雷卡通关无尽10关', icon:'🔰' },
            { id:49, name:'手滑', desc:'长按误触50次', icon:'🖐️' },
            { id:50, name:'战争之王', desc:'积分达到1000', icon:'🌸' }
        ];

        // ---------- 用户数据结构 ----------
        let currentUser = null;

        function getUserKey(phone) { return `minesweeper_v2_${phone}`; }

        function loadUser(phone) {
            const key = getUserKey(phone);
            const data = localStorage.getItem(key);
            if (data) {
                try { return JSON.parse(data); } catch(e){}
            }
            // 新用户：初始积分990，其他0
            return {
                phone: phone,
                points: 990,                     // 初始990
                cards: 0,                         // 排雷卡
                extraLifeCards: 0,                 // 免死卡
                sweepCards: 0,                      // 扫荡卡
                achievements: {},
                firstBombStreak: 0,
                stats: { cellsOpened:0, flagsPlaced:0, cardsUsed:0, gamesPlayed:0, wins:0, losses:0 }
            };
        }

        function saveUser(user) {
            const key = getUserKey(user.phone);
            localStorage.setItem(key, JSON.stringify(user));
        }

        function refreshMenuUserInfo() {
            if (!currentUser) return;
            document.getElementById('menuPhone').innerText = currentUser.phone.slice(0,3)+'****'+currentUser.phone.slice(-4);
            document.getElementById('menuPoints').innerText = currentUser.points;
            document.getElementById('menuCards').innerText = currentUser.cards;
            document.getElementById('menuExtraLife').innerText = currentUser.extraLifeCards || 0;
            document.getElementById('menuSweep').innerText = currentUser.sweepCards || 0;
        }

        function unlockAchievement(achId, condition) {
            if (!currentUser) return false;
            const idStr = String(achId);
            if (!condition) return false;
            if (!currentUser.achievements[idStr]) {
                currentUser.achievements[idStr] = true;
                saveUser(currentUser);
                const ach = ACHIEVEMENTS.find(a => a.id == achId);
                if (ach) alert(`🏅 解锁成就: ${ach.name}\n${ach.desc}`);
                return true;
            }
            return false;
        }

        // ---------- 扫雷核心 ----------
        class MineGame {
            constructor(rows, cols, mines, mode='casual', level=1) {
                this.rows = rows; this.cols = cols; this.mines = mines;
                this.mode = mode; this.level = level;
                this.board = [];
                this.gameOver = false;
                this.win = false;
                this.firstClick = true;
                this.firstClickBomb = false;
                this.startTime = Date.now();
                this.flagsPlaced = 0;
                this.cellsOpened = 0;
                this.initBoard();
                this.placeMines();
            }
            initBoard() {
                for (let r=0; r<this.rows; r++) {
                    let row = [];
                    for (let c=0; c<this.cols; c++) row.push({ mine: false, neighbor: 0, open: false, flag: false });
                    this.board.push(row);
                }
            }
            placeMines() {
                let placed = 0;
                while (placed < this.mines) {
                    const r = Math.floor(Math.random() * this.rows);
                    const c = Math.floor(Math.random() * this.cols);
                    if (!this.board[r][c].mine) { this.board[r][c].mine = true; placed++; }
                }
                this.calcNeighbors();
            }
            calcNeighbors() {
                for (let r=0; r<this.rows; r++) {
                    for (let c=0; c<this.cols; c++) {
                        if (this.board[r][c].mine) continue;
                        let cnt = 0;
                        for (let dr=-1; dr<=1; dr++) for (let dc=-1; dc<=1; dc++) {
                            if (dr===0 && dc===0) continue;
                            const nr=r+dr, nc=c+dc;
                            if (nr>=0 && nr<this.rows && nc>=0 && nc<this.cols && this.board[nr][nc].mine) cnt++;
                        }
                        this.board[r][c].neighbor = cnt;
                    }
                }
            }
            leftClick(row, col) {
                if (this.gameOver) return false;
                const cell = this.board[row][col];
                if (cell.open || cell.flag) return false;
                if (this.firstClick) { this.firstClick = false; if (cell.mine) this.firstClickBomb = true; }
                if (cell.mine) {
                    // 触发免死卡检查
                    if (currentUser && currentUser.extraLifeCards > 0) {
                        currentUser.extraLifeCards--;
                        cell.flag = true;  // 自动标记这颗雷
                        this.flagsPlaced++;
                        saveUser(currentUser);
                        refreshMenuUserInfo();
                        updateCardCounts();
                        alert('🛡️ 免死卡生效，你被救了！');
                        return { gameOver: false, win: false, bomb: true, extraLifed: true };
                    } else {
                        this.gameOver = true; this.win = false;
                        return { gameOver: true, win: false, bomb: true };
                    }
                } else {
                    this.openCell(row, col);
                    return { gameOver: this.checkWin(), win: this.checkWin(), bomb: false };
                }
            }
            rightClick(row, col) {
                if (this.gameOver) return;
                const cell = this.board[row][col];
                if (cell.open) return;
                cell.flag = !cell.flag;
                this.flagsPlaced += cell.flag ? 1 : -1;
                if (this.checkWin()) this.gameOver = true;
            }
            openCell(row, col) {
                const cell = this.board[row][col];
                if (cell.open || cell.flag || this.gameOver) return;
                cell.open = true;
                this.cellsOpened++;
                if (cell.neighbor === 0 && !cell.mine) {
                    for (let dr=-1; dr<=1; dr++) for (let dc=-1; dc<=1; dc++) {
                        if (dr===0 && dc===0) continue;
                        const nr=row+dr, nc=col+dc;
                        if (nr>=0 && nr<this.rows && nc>=0 && nc<this.cols) {
                            if (!this.board[nr][nc].open && !this.board[nr][nc].mine && !this.board[nr][nc].flag)
                                this.openCell(nr, nc);
                        }
                    }
                }
            }
            expandAround(row, col) {
                const cell = this.board[row][col];
                if (!cell.open || cell.neighbor === 0) return false;
                let flagCount = 0, neighbors = [];
                for (let dr=-1; dr<=1; dr++) for (let dc=-1; dc<=1; dc++) {
                    if (dr===0 && dc===0) continue;
                    const nr=row+dr, nc=col+dc;
                    if (nr>=0 && nr<this.rows && nc>=0 && nc<this.cols) {
                        neighbors.push([nr, nc]);
                        if (this.board[nr][nc].flag) flagCount++;
                    }
                }
                if (flagCount !== cell.neighbor) return false;
                for (let [nr, nc] of neighbors) {
                    if (this.board[nr][nc].flag && !this.board[nr][nc].mine) {
                        // 标记错误，且没有免死卡则炸
                        if (currentUser && currentUser.extraLifeCards > 0) {
                            currentUser.extraLifeCards--;
                            this.board[nr][nc].flag = false; // 取消错误旗？或者保留？简单处理：标记为正确旗并消耗免死
                            this.board[nr][nc].flag = true; // 实际应该是雷？但这里不是雷，所以不能标记。我们改为强制打开？免死卡不能阻止标记错误导致的爆炸？根据免死卡定义“错误点开一个雷”，这里不是点开，是展开时发现标记错误，应该算炸。但免死卡只针对点开雷。所以这里不应用免死卡。按规则，标记错误且展开会导致爆炸，不能免死。我们保持原逻辑：直接炸。
                            this.gameOver = true; this.win = false;
                            return { gameOver: true, win: false, bomb: true };
                        } else {
                            this.gameOver = true; this.win = false;
                            return { gameOver: true, win: false, bomb: true };
                        }
                    }
                }
                for (let [nr, nc] of neighbors) {
                    if (!this.board[nr][nc].flag && !this.board[nr][nc].open && !this.board[nr][nc].mine)
                        this.openCell(nr, nc);
                }
                if (this.checkWin()) this.gameOver = true;
                return true;
            }
            // 使用排雷卡：随机标记一颗雷，并显示该雷九宫格内的一个数字
            useMineCard() {
                if (this.gameOver) return false;
                // 找出所有未打开的雷且未被标记
                let minePositions = [];
                for (let r=0; r<this.rows; r++) {
                    for (let c=0; c<this.cols; c++) {
                        if (this.board[r][c].mine && !this.board[r][c].flag && !this.board[r][c].open) {
                            minePositions.push([r,c]);
                        }
                    }
                }
                if (minePositions.length === 0) {
                    alert('没有可标记的雷了');
                    return false;
                }
                // 随机选一个雷
                const randIndex = Math.floor(Math.random() * minePositions.length);
                const [mr, mc] = minePositions[randIndex];
                // 标记它
                this.board[mr][mc].flag = true;
                this.flagsPlaced++;
                // 从该雷的九宫格内找未打开的数字格子
                let numberPositions = [];
                for (let dr=-1; dr<=1; dr++) {
                    for (let dc=-1; dc<=1; dc++) {
                        if (dr===0 && dc===0) continue;
                        const nr = mr+dr, nc = mc+dc;
                        if (nr>=0 && nr<this.rows && nc>=0 && nc<this.cols) {
                            const cell = this.board[nr][nc];
                            if (!cell.mine && !cell.open && !cell.flag && cell.neighbor > 0) {
                                numberPositions.push([nr, nc]);
                            }
                        }
                    }
                }
                if (numberPositions.length > 0) {
                    const randNum = Math.floor(Math.random() * numberPositions.length);
                    const [nr, nc] = numberPositions[randNum];
                    this.openCell(nr, nc);  // 显示数字
                }
                if (this.checkWin()) this.gameOver = true;
                return true;
            }
            // 使用扫荡卡：选择一行或一列，优先已打开格子最少的一行/列
            useSweepCard() {
                if (this.gameOver) return false;
                // 计算每行和每列已打开格子数
                let rowOpened = new Array(this.rows).fill(0);
                let colOpened = new Array(this.cols).fill(0);
                for (let r=0; r<this.rows; r++) {
                    for (let c=0; c<this.cols; c++) {
                        if (this.board[r][c].open) {
                            rowOpened[r]++;
                            colOpened[c]++;
                        }
                    }
                }
                // 找出最少打开的行和列（取最小值）
                let minRowOpened = Math.min(...rowOpened);
                let minColOpened = Math.min(...colOpened);
                let candidates = [];
                if (minRowOpened <= minColOpened) {
                    // 行优先
                    for (let r=0; r<this.rows; r++) if (rowOpened[r] === minRowOpened) candidates.push({type:'row', idx:r});
                }
                if (minColOpened <= minRowOpened) {
                    for (let c=0; c<this.cols; c++) if (colOpened[c] === minColOpened) candidates.push({type:'col', idx:c});
                }
                if (candidates.length === 0) return false;
                // 随机选一个
                const chosen = candidates[Math.floor(Math.random() * candidates.length)];
                if (chosen.type === 'row') {
                    const r = chosen.idx;
                    for (let c=0; c<this.cols; c++) {
                        const cell = this.board[r][c];
                        if (cell.mine && !cell.flag && !cell.open) {
                            cell.flag = true;
                            this.flagsPlaced++;
                        } else if (!cell.mine && !cell.open && !cell.flag) {
                            this.openCell(r, c);
                        }
                    }
                } else {
                    const c = chosen.idx;
                    for (let r=0; r<this.rows; r++) {
                        const cell = this.board[r][c];
                        if (cell.mine && !cell.flag && !cell.open) {
                            cell.flag = true;
                            this.flagsPlaced++;
                        } else if (!cell.mine && !cell.open && !cell.flag) {
                            this.openCell(r, c);
                        }
                    }
                }
                if (this.checkWin()) this.gameOver = true;
                return true;
            }
            checkWin() {
                for (let r=0; r<this.rows; r++) for (let c=0; c<this.cols; c++) {
                    if (!this.board[r][c].mine && !this.board[r][c].open) return false;
                }
                this.win = true; this.gameOver = true; return true;
            }
            getBoard() { return this.board; }
        }

        // ---------- 绘图 ----------
        function drawBoard(game) {
            if (!game) return;
            const board = game.getBoard();
            const rows = game.rows, cols = game.cols;
            const w = canvas.width, h = canvas.height;
            const cellW = w / cols, cellH = h / rows;
            ctx.clearRect(0,0,w,h);
            // 网格线
            ctx.strokeStyle = '#2f5577';
            ctx.lineWidth = 1.5;
            for (let r=0; r<=rows; r++) {
                ctx.beginPath();
                ctx.moveTo(0, r*cellH);
                ctx.lineTo(w, r*cellH);
                ctx.strokeStyle = '#3b6583';
                ctx.stroke();
            }
            for (let c=0; c<=cols; c++) {
                ctx.beginPath();
                ctx.moveTo(c*cellW, 0);
                ctx.lineTo(c*cellW, h);
                ctx.strokeStyle = '#3b6583';
                ctx.stroke();
            }
            // 填充格子
            for (let r=0; r<rows; r++) {
                for (let c=0; c<cols; c++) {
                    const cell = board[r][c];
                    let x = c*cellW, y = r*cellH;
                    if (cell.open) {
                        ctx.fillStyle = '#f0f4f8';
                        ctx.fillRect(x+1, y+1, cellW-2, cellH-2);
                        if (cell.neighbor > 0) {
                            let color = '#000000';
                            if (cell.neighbor === 1) color = '#1e6df2';
                            else if (cell.neighbor === 2) color = '#1e8f1e';
                            else if (cell.neighbor === 3) color = '#e34234';
                            else if (cell.neighbor === 4) color = '#0b235c';
                            else if (cell.neighbor === 5) color = '#7b3f00';
                            else if (cell.neighbor === 6) color = '#2b6f6f';
                            else if (cell.neighbor === 7) color = '#000000';
                            else if (cell.neighbor === 8) color = '#5e5e5e';
                            ctx.fillStyle = color;
                            ctx.font = `bold ${cellH*0.7}px 'Arial', 'Segoe UI', sans-serif`;
                            ctx.textAlign = 'center';
                            ctx.textBaseline = 'middle';
                            ctx.fillText(cell.neighbor, x+cellW/2, y+cellH/2);
                        }
                    } else {
                        ctx.fillStyle = '#364f66';
                        ctx.fillRect(x+1, y+1, cellW-2, cellH-2);
                        ctx.fillStyle = '#253b4b';
                        ctx.fillRect(x+2, y+2, cellW-4, cellH-4);
                        if (cell.flag) {
                            ctx.font = `${cellH*0.7}px sans-serif`;
                            ctx.fillStyle = '#f2c94c';
                            ctx.fillText('🚩', x+cellW/2-2, y+cellH/2-2);
                        }
                    }
                }
            }
            // 游戏结束时显示所有雷
            if (game.gameOver && !game.win) {
                for (let r=0; r<rows; r++) {
                    for (let c=0; c<cols; c++) {
                        if (game.board[r][c].mine && !game.board[r][c].flag) {
                            let x = c*cellW, y = r*cellH;
                            ctx.font = `${cellH*0.8}px sans-serif`;
                            ctx.fillStyle = '#ff4444';
                            ctx.fillText('💣', x+cellW/2-4, y+cellH/2-4);
                        }
                    }
                }
            }
            document.getElementById('gameMineLabel').innerText = `💣 剩余: ${game.mines - game.flagsPlaced}`;
            // 更新卡片数量显示
            updateCardCounts();
        }

                document.getElementById('mineCardCount').innerText = currentUser.cards;

        // 根据关卡计算无尽模式的行列
        function getEndlessBoardSize(level) {
            const mines = level + 9;
            const minCells = mines * 4;
            let rows = Math.ceil(Math.sqrt(minCells));
            let cols = Math.ceil(minCells / rows);
            rows = Math.max(2, rows);
            cols = Math.max(2, cols);
            return { rows, cols, mines };
        }

        function startGame(rows, cols, mines, mode='casual', level=1) {
            currentGame = new MineGame(rows, cols, mines, mode, level);
            canvas.width = Math.min(800, cols * 38);
            canvas.height = Math.min(800, rows * 38);
            drawBoard(currentGame);
            document.getElementById('gameContainer').style.display = 'block';
        }

        // 绑定canvas事件（支持长按插旗）
        function bindCanvasEvents() {
            // 鼠标/触摸按下
            function startPress(row, col) {
                if (!currentGame || currentGame.gameOver) return;
                longPressRow = row; longPressCol = col;
                isLongPressTriggered = false;
                longPressTimer = setTimeout(() => {
                    if (!currentGame.gameOver && longPressRow !== -1) {
                        // 长按触发插旗
                        currentGame.rightClick(longPressRow, longPressCol);
                        drawBoard(currentGame);
                        isLongPressTriggered = true;
                        // 统计成就
                        currentUser.stats.flagsPlaced = (currentUser.stats.flagsPlaced || 0) + 1;
                        if (currentUser.stats.flagsPlaced >= 100) unlockAchievement(3, true);
                    }
                }, 2000); // 2秒
            }
            function clearPress() {
                if (longPressTimer) {
                    clearTimeout(longPressTimer);
                    longPressTimer = null;
                }
                longPressRow = -1; longPressCol = -1;
            }

            canvas.addEventListener('mousedown', (e) => {
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                const x = (e.clientX - rect.left) * scaleX;
                const y = (e.clientY - rect.top) * scaleY;
                if (!currentGame) return;
                const cellW = canvas.width / currentGame.cols;
                const cellH = canvas.height / currentGame.rows;
                const col = Math.floor(x / cellW);
                const row = Math.floor(y / cellH);
                if (row<0||row>=currentGame.rows||col<0||col>=currentGame.cols) return;
                if (e.button === 0) {
                    // 左键：开始长按检测，同时也要处理单击（在mouseup时判断）
                    startPress(row, col);
                } else if (e.button === 2) {
                    e.preventDefault(); // 右键直接插旗（保留传统）
                    currentGame.rightClick(row, col);
                    drawBoard(currentGame);
                }
            });
            canvas.addEventListener('mouseup', (e) => {
                if (e.button !== 0) return;
                if (!currentGame || currentGame.gameOver) { clearPress(); return; }
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                const x = (e.clientX - rect.left) * scaleX;
                const y = (e.clientY - rect.top) * scaleY;
                const cellW = canvas.width / currentGame.cols;
                const cellH = canvas.height / currentGame.rows;
                const col = Math.floor(x / cellW);
                const row = Math.floor(y / cellH);
                if (row<0||row>=currentGame.rows||col<0||col>=currentGame.cols) { clearPress(); return; }
                if (longPressTimer && !isLongPressTriggered && row === longPressRow && col === longPressCol) {
                    // 单击（短按）
                    clearTimeout(longPressTimer);
                    longPressTimer = null;
                    // 处理左键点击（数字展开或打开）
                    if (currentGame.board[row][col].open && currentGame.board[row][col].neighbor > 0) {
                        const res = currentGame.expandAround(row, col);
                        drawBoard(currentGame);
                        if (currentGame.gameOver) handleGameEnd();
                    } else {
                        const res = currentGame.leftClick(row, col);
                        drawBoard(currentGame);
                        if (currentGame.gameOver) handleGameEnd();
                    }
                }
                clearPress();
            });
            canvas.addEventListener('mouseleave', () => {
                clearPress();
            });

            // 触摸事件
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                const x = (touch.clientX - rect.left) * scaleX;
                const y = (touch.clientY - rect.top) * scaleY;
                if (!currentGame) return;
                const cellW = canvas.width / currentGame.cols;
                const cellH = canvas.height / currentGame.rows;
                const col = Math.floor(x / cellW);
                const row = Math.floor(y / cellH);
                if (row<0||row>=currentGame.rows||col<0||col>=currentGame.cols) return;
                startPress(row, col);
            }, {passive:false});
            canvas.addEventListener('touchend', (e) => {
                e.preventDefault();
                if (!currentGame || currentGame.gameOver) { clearPress(); return; }
                const touch = e.changedTouches[0];
                if (!touch) { clearPress(); return; }
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                const x = (touch.clientX - rect.left) * scaleX;
                const y = (touch.clientY - rect.top) * scaleY;
                const cellW = canvas.width / currentGame.cols;
                const cellH = canvas.height / currentGame.rows;
                const col = Math.floor(x / cellW);
                const row = Math.floor(y / cellH);
                if (row<0||row>=currentGame.rows||col<0||col>=currentGame.cols) { clearPress(); return; }
                if (longPressTimer && !isLongPressTriggered && row === longPressRow && col === longPressCol) {
                    clearTimeout(longPressTimer);
                    longPressTimer = null;
                    // 单击
                    if (currentGame.board[row][col].open && currentGame.board[row][col].neighbor > 0) {
                        const res = currentGame.expandAround(row, col);
                        drawBoard(currentGame);
                        if (currentGame.gameOver) handleGameEnd();
                    } else {
                        const res = currentGame.leftClick(row, col);
                        drawBoard(currentGame);
                        if (currentGame.gameOver) handleGameEnd();
                    }
                }
                clearPress();
            });
            canvas.addEventListener('touchcancel', () => clearPress());
            canvas.addEventListener('touchmove', (e) => {
                // 移动时取消长按
                clearPress();
            }, {passive:false});
            canvas.addEventListener('contextmenu', e => e.preventDefault());
        }

            const mineSpan = div.querySelector('#mineShow');
            slider.oninput = () => {
                levelSpan.innerText = slider.value;
                mineSpan.innerText = (parseInt(slider.value) + 9);
            };
            mineSpan.innerText = 10;
            div.querySelector('#startEndless').onclick = () => {
                const level = parseInt(slider.value);
                const { rows, cols, mines } = getEndlessBoardSize(level);
                div.remove();
                startGame(rows, cols, mines, 'endless', level);
            };
        });

        // 商店
        document.getElementById('shopBtn').addEventListener('click', () => {
            if (!currentUser) return;
            const div = document.createElement('div');
            div.className = 'modal-overlay';
            div.innerHTML = `
                <div class="modal-content">
                    <button class="close-btn" onclick="this.closest('.modal-overlay').remove()">✖</button>
                    <h2>🔧 军需商店</h2>
                    <p>当前积分: ${currentUser.points}</p>
                    <div style="display:flex; flex-direction:column; gap:20px; margin-top:20px;">
                        <div style="background:#1b2c3b; border-radius:40px; padding:20px;">
                            <p style="font-size:1.5rem;">🃏 排雷卡 · 10积分</p>
                            <button class="war-btn small" id="buyMineCard">购买</button>
                        </div>
                        <div style="background:#1b2c3b; border-radius:40px; padding:20px;">
                            <p style="font-size:1.5rem;">⚡ 扫荡卡 · 50积分</p>
                            <button class="war-btn small" id="buySweepCard">购买</button>
                        </div>
                        <div style="background:#1b2c3b; border-radius:40px; padding:20px;">
                            <p style="font-size:1.5rem;">🛡️ 免死卡 · 20积分</p>
                            <button class="war-btn small" id="buyExtraLifeCard">购买</button>
                        </div>
                    </div>
                </div>
            `;
            document.body.appendChild(div);
            div.querySelector('#buyMineCard').onclick = () => {
                if (currentUser.points >= 10) {
                    currentUser.points -= 10;
                    currentUser.cards += 1;
                    saveUser(currentUser);
                    refreshMenuUserInfo();
                    div.remove();
                    alert('获得一张排雷卡');
                } else alert('积分不足');
            };
            div.querySelector('#buySweepCard').onclick = () => {
                if (currentUser.points >= 50) {
                    currentUser.points -= 50;
                    currentUser.sweepCards = (currentUser.sweepCards || 0) + 1;
                    saveUser(currentUser);
                    refreshMenuUserInfo();
                    div.remove();
                    alert('获得一张扫荡卡');
                } else alert('积分不足');
            };
            div.querySelector('#buyExtraLifeCard').onclick = () => {
                if (currentUser.points >= 20) {
                    currentUser.points -= 20;
                    currentUser.extraLifeCards = (currentUser.extraLifeCards || 0) + 1;
                    saveUser(currentUser);
                    refreshMenuUserInfo();
                    div.remove();
                    alert('获得一张免死卡');
                } else alert('积分不足');
            };
        });

        // 成就
        document.getElementById('achievementBtn').addEventListener('click', () => {
            if (!currentUser) return;
            const div = document.createElement('div');
            div.className = 'modal-overlay';
            let html = `<div class="modal-content" style="max-width:800px;"><button class="close-btn" onclick="this.closest('.modal-overlay').remove()">✖</button><h2>🏅 成就 (${Object.values(currentUser.achievements).filter(v=>v).length}/${ACHIEVEMENTS.length})</h2><div class="achievement-grid" style="max-height:60vh; overflow-y:auto; padding-right:10px;">`;
            ACHIEVEMENTS.forEach(ach => {
                const unlocked = currentUser.achievements[ach.id];
                html += `<div class="achievement-item ${unlocked ? 'unlocked' : ''}"><span class="achievement-icon">${ach.icon}</span><div><b>${ach.name}</b><br><small>${ach.desc}</small></div></div>`;
            });
            html += '</div></div>';
            div.innerHTML = html;
            document.body.appendChild(div);
        });

        // 帮助
        document.getElementById('helpBtn').addEventListener('click', () => {
            const div = document.createElement('div');
            div.className = 'modal-overlay';
            div.innerHTML = `
                <div class="modal-content">
                    <button class="close-btn" onclick="this.closest('.modal-overlay').remove()">✖</button>
                    <h2>📡 作战手册</h2>
                    <div class="help-text">
                        <p>⚡ 左键单击：打开格子 / 双击数字展开</p>
                        <p>🚩 长按格子2秒：插旗/拔旗</p>
                        <p>🃏 排雷卡：点击后随机标记一颗雷，并显示其九宫格内一个数字</p>
                        <p>⚡ 扫荡卡：随机选择已打开最少的一行或一列，自动标记该行/列所有雷并显示所有数字</p>
                        <p>🛡️ 免死卡：踩到雷时自动消耗并标记该雷，游戏继续</p>
                        <p>🌲 休闲模式：普通/困难/专家及自定义</p>
                        <p>♾️ 无尽模式：1-99关，雷数=关卡+9，方格动态保证雷数≤格子数/4</p>
                        <p>🏅 成就：50个等待解锁，包括“一点就炸”</p>
                        <p>💾 数据保存在本地浏览器</p>
                    </div>
                </div>
            `;
            document.body.appendChild(div);
        });

        // 卡片按钮监听
        document.getElementById('useMineCardBtn').addEventListener('click', useMineCard);
        document.getElementById('useSweepCardBtn').addEventListener('click', useSweepCard);
        document.getElementById('useExtraLifeCardBtn').addEventListener('click', useExtraLifeCard);

        setInterval(() => {
            if (currentGame && currentUser) updateCardCounts();
        }, 200);
        bindCanvasEvents();
    })();
</script>
<div class="footer">⚙️ 长按插旗 · 卡片战略 · 免死护身 ⚙️</div>
</body>
</html>
